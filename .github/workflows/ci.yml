name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20.x"

jobs:
  backend:
    name: Backend — lint, build, test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore BookTrack.slnx

      - name: Build
        run: dotnet build BookTrack.slnx --configuration Release --no-restore

      - name: Unit & architecture tests
        run: |
          dotnet test BookTrack.slnx \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage.cobertura.xml"

  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo name
        env:
          REPO_RAW: ${{ github.repository }}
        run: echo "REPO=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BookTrack.Api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ env.REPO }}/api:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=api' || '' }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          target: prod
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=frontend' || '' }}
